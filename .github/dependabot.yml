version: 2
updates:
  # Enable version updates for npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "choihooo"
    assignees:
      - "choihooo"
    commit-message:
      prefix: "chore"
      include: "scope"
    allow:
      - dependency-type: "production"
      - dependency-type: "dev"
    ignore:
      # Ignore major version updates for these packages
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      # Group React ecosystem updates together
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
      # Group testing dependencies
      testing-dependencies:
        patterns:
          - "@testing-library/*"
          - "vitest*"
          - "@vitest/*"
          - "@playwright/*"
      # Group build tools
      build-tools:
        patterns:
          - "vite"
          - "turbo"
          - "esbuild*"
      # Group linting and formatting
      linting-tools:
        patterns:
          - "@biomejs/*"
          - "eslint*"
          - "prettier*"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "choihooo"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "actions/*"
          - "github/*"
