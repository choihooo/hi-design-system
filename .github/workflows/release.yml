name: Release

on:
  push:
    branches:
      - main

jobs:
  # Pre-release checks
  pre-release:
    name: Pre-Release Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run all quality checks
        run: |
          echo "Running pre-release quality checks..."

          # Build
          pnpm build
          if [ $? -ne 0 ]; then
            echo "❌ Build failed - cannot release"
            exit 1
          fi

          # Type check
          pnpm type-check
          if [ $? -ne 0 ]; then
            echo "❌ Type check failed - cannot release"
            exit 1
          fi

          # Lint
          pnpm lint
          if [ $? -ne 0 ]; then
            echo "❌ Lint failed - cannot release"
            exit 1
          fi

          # Tests
          pnpm test:run
          if [ $? -ne 0 ]; then
            echo "❌ Tests failed - cannot release"
            exit 1
          fi

          echo "✅ All pre-release checks passed"

  release:
    name: Release
    needs: pre-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          commit: 'chore(release): version packages [skip ci]'
          title: 'chore(release): version packages [skip ci]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate Release Notes
        if: steps.changesets.outputs.published == 'true'
        id: release_notes
        run: |
          # Get version from published packages
          VERSION="${{ steps.changesets.outputs.publishedPackages[0].version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Generate release notes from commits
          cat > release-notes.md << EOF
          ## 🚀 Release $VERSION

          ### 📦 Published Packages

          ${{ steps.changesets.outputs.publishedPackages }}

          ### ✨ What's Changed

          This release includes changes from the following commits:

          $(git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD)

          ### 📊 Full Changelog

          For detailed changes, see the [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)

          ### 🙏 Thank You

          Special thanks to all contributors who made this release possible!

          ---
          *Automatically generated by GitHub Actions*
          EOF

          cat release-notes.md

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.release_notes.outputs.version }}
          release_name: Release ${{ steps.release_notes.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false

      - name: Post-Release Notification
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.release_notes.outputs.version }}';
            const body = `## 🎉 Release Published Successfully!

            Version **${version}** has been published to npm!

            ### 📦 Available Packages

            ${{ steps.changesets.outputs.publishedPackages }}

            ### 🔗 Links
            - [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/v${version})
            - [npm Package](https://www.npmjs.com/package/${{ github.event.repository.name }})
            - [Documentation](https://github.com/${{ github.repository }}#readme)
            - [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)

            ### 📥 Installation

            \`\`\`bash
            pnpm add ${{ github.event.repository.name }}
            \`\`\`

            ### ✅ Post-Deployment Checks

            Automated health checks and smoke tests are running...

            ℹ️ *This release was created automatically based on commit messages*
            `;

            // Create a release announcement issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🎉 Release ${version} Published`,
              body: body,
              labels: ['announcement', 'release'],
            });
